# .github/workflows/ci.yml
# CI for Bingo Vintage — runs on every push to main and every PR.
#
# Critical: uses real PostgreSQL 15 (not SQLite).
#   SELECT...FOR UPDATE, enum type DDL, and IF NOT EXISTS guards
#   are all PostgreSQL-specific. SQLite gives false passes.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — migrate + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER:     bingo_test
          POSTGRES_PASSWORD: bingo_test
          POSTGRES_DB:       bingo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL:    postgresql://bingo_test:bingo_test@localhost:5432/bingo_test
      NODE_ENV:        test
      JWT_SECRET:      ci-test-secret-32chars-not-for-production
      JWT_EXPIRES_IN:  1h
      PORT:            3001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install
        working-directory: backend
        run: npm ci

      - name: Build (TypeScript compile check)
        working-directory: backend
        run: npm run build

      - name: Run migrations against real PostgreSQL
        working-directory: backend
        run: npm run migration:run:prod

      - name: Verify migration count
        run: |
          COUNT=$(psql $DATABASE_URL -t -c "SELECT COUNT(*) FROM migrations;")
          echo "Migrations ran: $COUNT"
          [ "$COUNT" -ge 15 ] || (echo "Expected >= 15 migrations" && exit 1)

      - name: Start backend
        working-directory: backend
        run: node dist/main &

      - name: Wait for health
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3001/api/health && echo "Ready" && break
            sleep 2
          done

      - name: Smoke — health check
        run: curl -sf http://localhost:3001/api/health | grep database

      - name: Concurrency test (pessimistic lock verification)
        working-directory: backend
        run: npx jest test/payment-concurrency.spec.ts --testTimeout=30000 --forceExit
        continue-on-error: true

  frontend:
    name: Frontend — type-check + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm install

      - name: Type-check (catches shared/api-types.ts contract violations)
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
